kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: app-ingress
  namespace: three
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          - path: /api/tasks
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
   
