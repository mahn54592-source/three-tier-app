kind: Deployment
apiVersion: apps/v1
metadata:
  name: frontend-deployment
  namespace: three
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: izumi09/three-frontend:latest
        ports:
        - containerPort: 80
        env:
          - name: VITE_API_URL
            value: "http://backend-service"
